<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Tom · El Cruce"/>
<meta name="theme-color" content="#111111"/>
<title>Tom · El Cruce 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0a;--surface:#1a1a1a;--surface2:#222;--ink:#f2f2f7;--muted:#6b6b6b;--border:#2a2a2a;
  --p0:#60a5fa;--p1:#4ade80;--p2:#fbbf24;--p3:#c084fc;--p4:#f87171;
  --run:#38bdf8;--qual:#f87171;--lng:#fbbf24;--swm:#22d3ee;
  --gleg:#a78bfa;--gup:#c084fc;--mob:#34d399;--b2b:#fb923c;--rst:#6b6b6b;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'JetBrains Mono','SF Mono','Menlo',monospace;
  --r:10px;--r2:14px;--nav-h:52px;--bot-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;background:#0a0a0a;-webkit-text-size-adjust:100%;}
body{font-family:var(--font);background:#0a0a0a;color:var(--ink);min-height:100vh;min-height:100dvh;overflow-x:hidden;overscroll-behavior:none;}

/* ── TOP NAV ── */
.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:#0a0a0a;
  display:flex;align-items:flex-end;
  padding:0 16px 12px;
  padding-top:max(12px, env(safe-area-inset-top));
  gap:12px;
  border-bottom:1px solid #2a2a2a;
  min-height:calc(var(--nav-h) + env(safe-area-inset-top,0px));
}
.app-title{font-family:var(--mono);font-size:12px;font-weight:500;color:#fff;letter-spacing:.08em;flex:1;}
.week-ctrl{display:flex;align-items:center;gap:6px;}
.wc-btn{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wc-btn:active{background:rgba(255,255,255,.2);}
.wc-label{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.6);min-width:40px;text-align:center;}

/* ── BOTTOM NAV ── */
.bot-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#0a0a0a;border-top:1px solid #2a2a2a;
  z-index:200;display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;border:none;background:none;cursor:pointer;color:#555;transition:color .15s;}
.bn-tab.active{color:var(--p1);}
.bn-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bn-label{font-size:10px;font-weight:500;}

/* ── PAGES ── */
.page{display:none;padding-top:calc(var(--nav-h) + env(safe-area-inset-top,0px) + 12px);padding-bottom:calc(var(--bot-h) + env(safe-area-inset-bottom,0px) + 12px);min-height:100dvh;-webkit-overflow-scrolling:touch;overflow-y:auto;}
.page.active{display:block;}
.pg-inner{padding:0 14px;}

/* ── TODAY ── */
.today-hero{background:#0f0f0f;border-bottom:1px solid var(--border);color:var(--ink);padding:20px 16px 24px;margin-bottom:16px;}
.th-phase{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.th-week{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:4px;}
.th-date{font-size:13px;color:var(--muted);margin-bottom:16px;}
.th-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.th-stat{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:10px;}
.th-stat-val{font-size:20px;font-weight:700;line-height:1;}
.th-stat-label{font-size:10px;color:var(--muted);margin-top:2px;}

.today-focus{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:14px;}
.tf-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.tf-text{font-size:13px;line-height:1.7;}

.today-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.td-day{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 3px;cursor:pointer;}
.td-day.is-today{border-color:var(--p1);border-width:2px;}
.td-name{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);text-align:center;margin-bottom:4px;}
.td-sessions{display:flex;flex-direction:column;gap:2px;}

.today-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:14px;overflow:hidden;}
.tdet-head{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);}
.tdet-day{font-weight:700;font-size:14px;}
.tdet-body{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}

/* ── SESSION TAGS — text + left border only, no background ── */
.stag{border-radius:5px;padding:5px 7px;font-size:11px;font-weight:600;line-height:1.3;border-left:2px solid currentColor;background:rgba(255,255,255,.04);}
.stag-sm{border-radius:3px;padding:2px 4px;font-size:10px;font-weight:600;line-height:1.2;display:block;border-left:2px solid currentColor;background:rgba(255,255,255,.04);}
.stag-dur{font-size:10px;font-weight:400;opacity:.6;display:block;margin-top:1px;}
.mob-tag{color:var(--mob);border-radius:3px;font-size:10px;font-weight:600;padding:2px 5px;display:inline-block;margin-top:2px;border-left:2px solid var(--mob);background:rgba(255,255,255,.04);}
.s-easy{color:var(--run);}
.s-quality{color:var(--qual);}
.s-long{color:var(--lng);}
.s-swim{color:var(--swm);}
.s-gym-leg{color:var(--gleg);}
.s-gym-up{color:var(--gup);}
.s-mob{color:var(--mob);}
.s-rest{color:var(--rst);}
.s-race{color:var(--p1);border-left-color:var(--p1);}
.s-tt{color:var(--lng);}
.s-b2b{color:var(--b2b);}

/* ── CALENDAR ── */
.phase-hdr{padding:18px 14px 10px;}
.ph-pill{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 10px;border-radius:100px;margin-bottom:6px;}
.ph-name{font-size:20px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px;}
.ph-desc{font-size:12px;color:var(--muted);line-height:1.6;}

.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin:0 14px 10px;}
.week-card.is-cur{border-color:var(--p1);border-width:2px;}
.wk-top{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.wk-num{font-family:var(--mono);font-size:18px;font-weight:600;min-width:34px;}
.wk-info{flex:1;min-width:0;}
.wk-label{font-weight:700;font-size:13px;}
.wk-date{font-family:var(--mono);font-size:10px;color:var(--muted);}
.wk-km{font-family:var(--mono);font-size:14px;font-weight:600;white-space:nowrap;}
.wk-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;white-space:nowrap;}
.wk-days{display:grid;grid-template-columns:repeat(7,1fr);}
.day-col{border-right:1px solid var(--border);}
.day-col:last-child{border-right:none;}
.day-col.is-today{background:rgba(74,222,128,.06);}
.dc-name{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);padding:5px 5px 3px;border-bottom:1px solid var(--border);}
.dc-sess{padding:4px 3px;display:flex;flex-direction:column;gap:2px;min-height:72px;}
.wk-focus{grid-column:1/-1;padding:8px 14px;background:var(--surface2);border-top:1px solid var(--border);font-size:11px;color:var(--muted);line-height:1.5;}

/* ── WORKOUTS TAB ── */
.wk-tab-section{padding:0 14px 16px;}
.section-hdr{font-size:17px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px;padding-top:20px;}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.prog-note{background:var(--surface2);border-radius:var(--r);padding:11px 14px;font-size:12px;color:var(--muted);margin-bottom:14px;border-left:3px solid var(--border);}
.phase-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ph-btn{font-family:var(--mono);font-size:10px;font-weight:500;padding:6px 13px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.ph-btn.active{background:#f2f2f7;color:#111;border-color:#f2f2f7;}
.workout-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.wc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;}
.wc-head{padding:12px 14px;border-bottom:1px solid var(--border);}
.wc-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.wc-meta{font-family:var(--mono);font-size:10px;color:var(--muted);}
.ex-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.ex-row:last-child{border-bottom:none;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-weight:500;}
.ex-note{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5;}
.chip{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
.chip-sets{background:rgba(56,189,248,.1);color:var(--run);border:1px solid rgba(56,189,248,.3);}
.chip-rpe{background:rgba(251,191,36,.1);color:var(--lng);border:1px solid rgba(251,191,36,.3);}

.run-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:12px;}
.run-head{padding:12px 14px;border-bottom:1px solid var(--border);}
.run-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.run-meta{font-family:var(--mono);font-size:10px;color:var(--muted);}
.run-row{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;display:flex;gap:8px;align-items:flex-start;}
.run-row:last-child{border-bottom:none;}
.run-label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);min-width:60px;flex-shrink:0;padding-top:1px;}
.run-detail{flex:1;line-height:1.6;}

.mob-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.mob-zone{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;}
.mob-zone-title{font-weight:600;font-size:12px;margin-bottom:6px;}
.mob-ex{font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border);line-height:1.4;}
.mob-ex:last-child{border-bottom:none;}
@media(max-width:500px){.mob-grid{grid-template-columns:1fr;}}

/* ── MISSED ── */
.missed-section{padding:0 14px;}
.miss-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:10px;}
.miss-head{padding:11px 14px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;}
.miss-body{padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.7;}
.miss-body strong{color:var(--ink);}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.quick-item{background:var(--surface2);border-radius:var(--r);padding:10px 12px;font-size:12px;line-height:1.6;}
.quick-item strong{color:var(--ink);display:block;margin-bottom:2px;}
.rule-card{font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px;}
.rule-card strong{color:var(--ink);}

/* ── SWIM NOTE ── */
.swim-note{border-left:2px solid var(--swm);border-radius:var(--r);padding:11px 14px;font-size:12px;color:var(--swm);margin-bottom:14px;line-height:1.6;background:rgba(34,211,238,.05);}


.countdown{display:flex;gap:8px;margin:0 14px 14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);align-items:center;}
.cd-unit{text-align:center;flex:1;}
.cd-val{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;color:var(--p3);}
.cd-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.cd-sep{font-family:var(--mono);font-size:18px;color:var(--border);padding-bottom:10px;}
.pace-calc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin:0 14px 14px;overflow:hidden;}
.pc-head{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
.pc-title{font-weight:700;font-size:13px;}
.pc-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.pc-input-row{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);}
.pc-input-row label{font-size:12px;color:var(--muted);min-width:60px;}
.pc-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--ink);font-family:var(--mono);font-size:14px;padding:6px 10px;width:70px;text-align:center;}
.pc-input:focus{outline:none;border-color:var(--p0);}
.pc-results{padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.pc-row{background:var(--surface2);border-radius:6px;padding:8px 10px;}
.pc-dist{font-size:10px;color:var(--muted);margin-bottom:2px;}
.pc-pace{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--p0);}
.milestone{margin:0 14px 14px;padding:14px 16px;border-radius:var(--r2);border:1px solid;font-size:13px;line-height:1.7;}
/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:14px;border-top:1px solid var(--border);margin-top:8px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
</style>
</head>
<body>

<div class="top-nav">
  <div class="app-title">TOM · EL CRUCE 2026</div>
  <div class="week-ctrl">
    <button class="wc-btn" onclick="changeWeek(-1)">‹</button>
    <span class="wc-label" id="wkLabel">Wk 1</span>
    <button class="wc-btn" onclick="changeWeek(1)">›</button>
  </div>
</div>

<div class="page active" id="pg-today"></div>
<div class="page" id="pg-plan"></div>
<div class="page" id="pg-workouts"></div>
<div class="page" id="pg-missed"></div>

<nav class="bot-nav" aria-label="Main navigation">
  <button class="bn-tab active" id="tab-today" onclick="showPage('today')" aria-label="Today's training">
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="bn-label">Today</span>
  </button>
  <button class="bn-tab" id="tab-plan" onclick="showPage('plan')" aria-label="Full training plan">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <span class="bn-label">Full Plan</span>
  </button>
  <button class="bn-tab" id="tab-workouts" onclick="showPage('workouts')" aria-label="Workout details">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 6.5h11M6.5 12h11M6.5 17.5h11"/><circle cx="4" cy="6.5" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="17.5" r="1"/></svg>
    <span class="bn-label">Workouts</span>
  </button>
  <button class="bn-tab" id="tab-missed" onclick="showPage('missed')" aria-label="Missed session protocol">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span class="bn-label">Missed?</span>
  </button>
</nav>

<script>
// ─── CONSTANTS ───────────────────────────────
const START = new Date('2026-06-08');
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// Training paces from 1-Mile TT (6:57 = 4:19/km)
// HR-ANCHORED (post-failed-TT, Jun 2026). Tempo: HR 157–170 / ~5:15–5:40/km. Reps: HR cap SCALES WITH REP LENGTH — ≤200m ~188 · 400–800m ~183 · 1km+ ~178. Never exceed 188 on any rep. ~4:25–4:35/km PROVISIONAL. Easy Z2: 6:50–7:30/km @ 140–150 bpm. All quality paces provisional until the Wk4 5K recalibration.
// RHR baseline: 44–50 bpm. If morning RHR ≥5 above 7-day avg → convert quality to easy.

// ─── PHASE INFO ──────────────────────────────
const PI = {
  0:{n:'5K Finish',c:'var(--p0)',l:'rgba(96,165,250,.15)',wks:'Wks 1–4',
     desc:'Finish the Reddit Intermediate 5K plan (Weeks 5–8). Quality anchored by HR (Jun 2026 recalibration): tempo HR 157–170 (~5:15–5:40/km) · reps controlled-hard — HR cap scales with rep length (≤200m ~188, 400–800m ~183, 1km+ ~178), ~4:25–4:35/km provisional. Pace numbers reset at the Wk4 5K. 2 quality run days per week. Easy runs: 140–150 bpm, walk if 155+ hit. Swim 4× flexible. Gym 3×. Time trial race end of Week 4.'},
  1:{n:'Aerobic Base',c:'var(--p1)',l:'rgba(74,222,128,.15)',wks:'Wks 5–11',
     desc:'One quality run day (Tuesday only). 4 run days: Tue quality · Thu easy · Fri easy · Sat long. All easy runs prescribed by TIME + HR cap (150 bpm), not distance — walk 30s any time HR hits 155. Stair repeats from Wk 9. Incline treadmill from Wk 10. Acquire trail shoes by Wk 9. BA Half Marathon Sun 23 Aug (Wk 11) — controlled tempo, not a PR attempt.'},
  2:{n:'Trail Build',c:'var(--p2)',l:'rgba(251,191,36,.15)',wks:'Wks 12–19',
     desc:'Two quality run days. B2B weekends: Sunday run always 60–65% of Saturday distance. Elevation via incline treadmill (8–10%) and San Isidro stairs. Fuel mandatory on all runs >90 min. Gym drops to 2×/week. Peak long run 35–38 km in Wk 19.'},
  3:{n:'Taper',c:'var(--p3)',l:'rgba(192,132,252,.15)',wks:'Wks 20–27',
     desc:'Volume drops each week. One quality day (Tuesday only). Gym holds at 2×/week (upper only, no heavy legs) through Wk 22, none from Wk 23 onward — full rest into El Cruce. Gear rehearsal Wk 22. Travel week Wk 26 (Sat 6 Dec). El Cruce Wk 27 (Dec 8–10).'},
  4:{n:'Recovery',c:'var(--p4)',l:'rgba(248,113,113,.15)',wks:'Wks 28–30',
     desc:'Zero running Wks 28–29. Swim from Wk 29. Bodyweight gym + easy running from Wk 30. Set 2027 goals only after feeling 100% recovered.'},
};

// ─── SESSION BUILDER ─────────────────────────
const TC = {easy:'s-easy',quality:'s-quality',long:'s-long',swim:'s-swim',
  'gym-leg':'s-gym-leg','gym-up':'s-gym-up',mob:'s-mob',rest:'s-rest',
  race:'s-race',tt:'s-tt',b2b:'s-b2b'};
function s(t,n,d){return{t,n,d:d||''};}
const m10=s('mob','Mobility','10 min');
const m15=s('mob','Mobility','15 min');
const m20=s('mob','Mobility','20 min');
const HR=s('rest','Home · Full Mobility Flow','30 min');
const SW4=s('swim','Swim (flex 4th)','30 min');

// ─── WEEK DATA ────────────────────────────────
// Structure: [Mon, Tue, Wed, Thu, Fri, Sat, Sun]
// Swim schedule: Mon + Tue AM (double) + Thu (double) + 1 flex day
// Mon: swim + gym-leg | Tue: swim AM + quality run PM | Wed: gym-leg + swim(flex)
// Thu: swim AM + easy run PM | Fri: easy run + gym-up | Sat: long | Sun: mobility only

const W = [
// ── PHASE 0 ──────────────────────────────────
{wk:1,ph:0,km:37,label:'5K Plan Wk 5',date:'8–14 Jun',badge:'',
focus:'Week 5 of the Reddit plan. Tue: 4×800m controlled-hard / 90s rest · HR cap ~183 (800m reps, ~4:25–4:35/km provisional). Sat: 15-min tempo at HR 157–170 (~5:15–5:40/km) embedded at the START of long run, then Z2. Easy runs: HR 140–150 bpm, walk 30s if 155+ hit.',
days:[

// Exact Monday start dates for each plan week (30 weeks total)
// Generated from Jun 8 2026 + (wk-1)*7 days
const WEEK_STARTS = (() => {
  const arr = [];
  const base = new Date('2026-06-08');
  for(let i = 0; i < 30; i++){
    const d = new Date(base);
    d.setDate(base.getDate() + i*7);
    arr.push(d.getTime());
  }
  return arr;
})();

function getAutoWeek(){
  const now = Date.now();
  if(now < WEEK_STARTS[0]) return 1;
  for(let i = WEEK_STARTS.length - 1; i >= 0; i--){
    if(now >= WEEK_STARTS[i]) return i + 1;
  }
  return 1;
}
function getDayIdx(){
  const d = new Date().getDay();
  return d===0?6:d-1;
}
function phaseOf(ph){return PI[ph];}
function phColor(ph){return['var(--p0)','var(--p1)','var(--p2)','var(--p3)','var(--p4)'][ph];}

// ─── SESSION RENDER ───────────────────────────
function sessHTML(s,small){
  if(!s) return '';
  if(s.t==='mob') return `<span class="mob-tag">${s.n} ${s.d}</span>`;
  const cls=TC[s.t]||'s-rest';
  if(small) return `<span class="stag-sm ${cls}">${s.n}</span>`;
  return `<div class="stag ${cls}">${s.n}<span class="stag-dur">${s.d}</span></div>`;
}

function badgeStyle(b){
  if(b==='RACE') return 'background:rgba(74,222,128,.15);color:var(--p1);border:1px solid rgba(74,222,128,.3)';
  if(b==='KEY') return 'background:rgba(96,165,250,.15);color:var(--p0);border:1px solid rgba(96,165,250,.3)';
  if(b==='DOWN') return 'background:rgba(52,211,153,.15);color:var(--mob);border:1px solid rgba(52,211,153,.3)';
  if(b==='TT') return 'background:rgba(251,191,36,.15);color:var(--lng);border:1px solid rgba(251,191,36,.3)';
  return '';
}


// ─── COUNTDOWN ────────────────────────────────
const RACE_DATE = new Date('2026-12-08T00:00:00');
function updateCountdown(){
  const el = document.getElementById('countdown');
  if(!el) return;
  const diff = RACE_DATE - Date.now();
  if(diff <= 0){el.innerHTML='<div class="cd-unit"><div class="cd-val" style="color:var(--p1)">🏁</div><div class="cd-label">Race day!</div></div>';return;}
  const d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000),
        m=Math.floor(diff%3600000/60000), s=Math.floor(diff%60000/1000);
  el.innerHTML=`<div class="cd-unit"><div class="cd-val">${d}</div><div class="cd-label">days</div></div>
    <div class="cd-sep">:</div><div class="cd-unit"><div class="cd-val">${String(h).padStart(2,'0')}</div><div class="cd-label">hrs</div></div>
    <div class="cd-sep">:</div><div class="cd-unit"><div class="cd-val">${String(m).padStart(2,'0')}</div><div class="cd-label">min</div></div>
    <div class="cd-sep">:</div><div class="cd-unit"><div class="cd-val">${String(s).padStart(2,'0')}</div><div class="cd-label">sec</div></div>`;
}
setInterval(updateCountdown, 1000);

// ─── PACE CALCULATOR ──────────────────────────
function calcPaces(){
  const minEl=document.getElementById('ttMin'), secEl=document.getElementById('ttSec'), distEl=document.getElementById('ttDist');
  if(!minEl||!secEl||!distEl) return;
  const ttSec=(parseFloat(minEl.value)||22)*60+(parseFloat(secEl.value)||30);
  const baseDist=parseFloat(distEl.value)||5000; // meters — whatever TT the user actually ran
  // Riegel: T2 = T1 × (D2/D1)^1.06
  function riegel(d){return ttSec*Math.pow(d/baseDist,1.06);}
  function fmt(s){s=Math.round(s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
  function pace(s,km){const spk=s/km;return Math.floor(spk/60)+':'+String(Math.round(spk%60)).padStart(2,'0')+'/km';}
  const distances=[['400m',0.4],['1K',1],['1 Mile',1.609],['5K',5],['10K',10],['HM',21.097]];
  const el=document.getElementById('paceResults');
  if(!el) return;
  // Also compute training paces
  const vdot5k=riegel(5000);
  const easy=pace(vdot5k*1.29,5), tempo=pace(vdot5k*1.088,5), rep=pace(vdot5k*0.934,5);
  el.innerHTML=distances.map(([n,km])=>`<div class="pc-row"><div class="pc-dist">${n}</div><div class="pc-pace">${fmt(riegel(km*1000))}</div></div>`).join('')
    +`<div class="pc-row" style="grid-column:1/-1;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2)"><div class="pc-dist">Training paces</div><div class="pc-pace" style="font-size:11px;line-height:1.7">Easy ${easy} · Tempo ${tempo} · Rep ${rep}</div></div>`;
}

// ─── MILESTONE CARD ───────────────────────────
const MILESTONES = {
  4: {color:'var(--p0)', title:'📊 Phase check-in — Week 4', body:'5K time trial this Saturday. After it, share with your coach: your finishing time, how the last 1km felt, and your avg HR. This recalibrates every training pace for Phase 1.'},
  11:{color:'var(--p1)', title:'📊 Phase check-in — Week 11', body:'BA Half Marathon this Sunday. Share: finish time, avg HR, and whether the last 5km fell apart or held. This determines Phase 2 intensity and confirms El Cruce readiness trajectory.'},
  19:{color:'var(--p2)', title:'📊 Phase check-in — Week 19', body:'Peak long run week (35–38km). Share: total distance, fueling strategy used, how your legs felt on Day 2 (Sunday B2B), and any tendon signals. This sets the taper entry point.'},
  27:{color:'var(--p3)', title:'📊 Phase check-in — Week 27', body:'El Cruce is done. Share: how each stage felt, nutrition/hydration execution, any injury signals, and what surprised you. This informs the 2027 plan.'},
};
function milestoneHTML(wk){
  const m = MILESTONES[wk];
  if(!m) return '';
  return `<div class="milestone" style="border-color:${m.color};background:${m.color}18;color:var(--ink)">
    <strong style="color:${m.color}">${m.title}</strong><br>${m.body}
  </div>`;
}

// ─── TODAY PAGE ───────────────────────────────

  const tod = getDayIdx();
  const todSess = wk.days[tod]||[];

  const statsHTML = `
    <div class="th-stats">
      <div class="th-stat">
        <div class="th-stat-val" style="color:${pc}">${wk.km}<span style="font-size:14px;opacity:.7"> km</span></div>
        <div class="th-stat-label">this week</div>
      </div>
      <div class="th-stat">
        <div class="th-stat-val" style="color:${pc}">${curWk}<span style="font-size:14px;opacity:.7">/30</span></div>

      </div>
      <div class="th-stat">

  }).join('');

  const todDetail = todSess.length
    ? todSess.map(s=>sessHTML(s,false)).join('')
    : '<div class="stag s-rest">Rest day</div>';

  document.getElementById('pg-today').innerHTML = `
    <div class="today-hero">
      <div class="th-phase">${ph.n} · ${wk.date}</div>
      <div class="th-week">Week ${curWk} — ${wk.label}</div>
      <div class="th-date">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
      ${statsHTML}
    </div>
    <div class="pg-inner">
      <div class="today-days">${miniDays}</div>
      <div class="today-detail">
        <div class="tdet-head"><div class="tdet-day">Today · ${DAYS[tod]}</div></div>
        <div class="tdet-body">${todDetail}</div>
      </div>
      <div id="countdown" class="countdown"></div>
      ${curWk<=4?`<div class="pace-calc">
        <div class="pc-head">
          <div><div class="pc-title">Pace Calculator</div><div class="pc-sub">Pace projector — enter any recent TT (real anchor: Wk4 5K)</div></div>
        </div>
        <div class="pc-input-row">
          <label>Distance</label>
          <select class="pc-input" id="ttDist" onchange="calcPaces()" style="width:90px">
            <option value="1609">1 Mile</option>
            <option value="3218">2 Mile</option>
            <option value="5000" selected>5K</option>
            <option value="10000">10K</option>
          </select>
        </div>
        <div class="pc-input-row">
          <label>Time</label>
          <input class="pc-input" id="ttMin" type="number" oninput="calcPaces()" min="3" max="60" placeholder="22" value="22">
          <span style="color:var(--muted);font-size:12px">min</span>
          <input class="pc-input" id="ttSec" type="number" oninput="calcPaces()" min="0" max="59" placeholder="30" value="30">
          <span style="color:var(--muted);font-size:12px">sec</span>
        </div>
        <div class="pc-results" id="paceResults"></div>
      </div>`:''}
      ${milestoneHTML(curWk)}
      <div class="today-focus">
        <div class="tf-label">Week focus</div>
        <div class="tf-text">${wk.focus}</div>
      </div>
      <div class="swim-note">
        💧 <strong>Swim schedule.</strong> Phase 0–1: 4× per week (Mon · Tue AM · Thu AM · 1 flex). Phase 2 (Wk 12+): drop to 3× per week when running exceeds 60km — drop the flex 4th swim. Tue AM swim is always the first dropped if fatigued before quality. Phase 0 sets: 4×25m kick → 4×25m catch-up → 6×50m/20s rest. Phase 1: 4×100m/30s rest. Phase 2: continuous 400m, technique focus.

        💓 <strong>RHR go/no-go rule.</strong> Your baseline: 44–50 bpm. If morning RHR is ≥5 bpm above your Garmin 7-day average → convert any quality session to a 50-min easy run at HR 140–150. No exceptions, no guilt.

// ─── FULL PLAN ────────────────────────────────
function renderPlan(){
  let html = '';
  let lastPh = -1;
  W.forEach(wk=>{
    if(wk.ph!==lastPh){
      const ph=phaseOf(wk.ph);
      const pc=phColor(wk.ph);
      html+=`<div class="phase-hdr">
        <div class="ph-pill" style="background:${ph.l};color:${pc};border:1px solid ${pc}22">${ph.wks}</div>
        <div class="ph-name" style="color:${pc}">${ph.n}</div>
        <div class="ph-desc">${ph.desc}</div>
      </div>`;
      lastPh=wk.ph;
    }
    const isCur=wk.wk===curWk;
    const pc=phColor(wk.ph);
    const bs=badgeStyle(wk.badge);
    const badge=wk.badge?`<span class="wk-badge" style="${bs}">${wk.badge}</span>`:'';
    const todIdx=getDayIdx();
    const dayCols=DAYS.map((d,i)=>{
      const ds=wk.days[i]||[];
      const isT=isCur&&i===todIdx;
      return `<div class="day-col${isT?' is-today':''}">
        <div class="dc-name"${isT?' style="color:var(--p0);font-weight:700"':''}>${d}</div>
        <div class="dc-sess">${ds.map(s=>sessHTML(s,false)).join('')}</div>
      </div>`;
    }).join('');
    html+=`<div class="week-card${isCur?' is-cur':''}" id="wk-${wk.wk}">
      <div class="wk-top">
        <span class="wk-num" style="color:${pc}">W${wk.wk}</span>
        <div class="wk-info">
          <div class="wk-label">${wk.label}${isCur?' ← now':''}</div>
          <div class="wk-date">${wk.date}</div>
        </div>
        ${badge}
        <span class="wk-km" style="color:${pc}">${wk.km} km</span>
      </div>
      <div class="wk-days">${dayCols}</div>
      <div class="wk-focus">${wk.focus}</div>
    </div>`;
  });
  html+=legendHTML();
  document.getElementById('pg-plan').innerHTML=html;
  setTimeout(()=>{
    const el=document.getElementById(`wk-${curWk}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

// ─── WORKOUTS TAB ─────────────────────────────
let _wkCache = {}; // memoize rendered workout HTML per phase
function renderWorkouts(){
  const cached = _wkCache[scPhase];
  if(cached){document.getElementById('pg-workouts').innerHTML=cached;return;}
  const pBtns=[0,1,2,3,4].map(p=>`
    <button class="ph-btn${scPhase===p?' active':''}" onclick="setScPhase(${p})">${PI[p].n}</button>`).join('');

  const sc=SC[scPhase];
  const rw=RW[scPhase];

  function gymCard(g){
    if(!g) return '';
    const rows=g.exs.map(e=>`
      <div class="ex-row">
        <div class="ex-info">
          <div class="ex-name">${e.n}</div>
          <div class="ex-note">${e.note}</div>
        </div>
        <span class="chip chip-sets">${e.sets}</span>
        <span class="chip chip-rpe">${e.rpe}</span>
      </div>`).join('');
    return `<div class="wc-card">
      <div class="wc-head" style="border-left:3px solid ${phColor(scPhase)}">
        <div class="wc-name">${g.n}</div>
        <div class="wc-meta">${g.day} · ${g.dur}</div>
      </div>${rows}
    </div>`;
  }

  function runCard(r){
    const cls=TC[r.type]||'s-rest';
    const rows=r.rows.map(row=>`
      <div class="run-row">
        <span class="run-label">${row.l}</span>
        <span class="run-detail">${row.d}</span>
      </div>`).join('');
    return `<div class="run-card">
      <div class="run-head" style="border-left:3px solid ${phColor(scPhase)}">
        <div class="run-name">${r.n}</div>
        <div class="run-meta">${r.day}</div>
      </div>${rows}
    </div>`;
  }

  const mobHTML=MOB.map(z=>`
    <div class="mob-zone">
      <div class="mob-zone-title" style="color:${z.c}">${z.z}</div>
      ${z.exs.map(e=>`<div class="mob-ex">${e}</div>`).join('')}
    </div>`).join('');

  const sunMobHTML=SUN_MOB.map(z=>`
    <div class="mob-zone">
      <div class="mob-zone-title" style="color:${z.c}">${z.z}</div>
      ${z.exs.map(e=>`<div class="mob-ex">${e}</div>`).join('')}
    </div>`).join('');

  const gymSection=sc?`
    <div class="section-hdr" style="color:${phColor(scPhase)}">Strength & Conditioning</div>
    <div class="section-sub">${sc.sub}</div>
    <div class="prog-note"><strong>Progression:</strong> ${sc.prog}</div>
    <div class="workout-cards">${gymCard(sc.gymA)}${gymCard(sc.gymB)}${gymCard(sc.gymC)}</div>`:'';

  const runSection=rw?`
    <div class="section-hdr" style="color:${phColor(scPhase)}">Running Workouts</div>
    <div class="section-sub">${rw.sub}</div>
    <div class="workout-cards">${rw.sessions.map(runCard).join('')}</div>`:'';

  const mobSection=`
    <div class="section-hdr">Daily Mobility · 10–20 min after running</div>
    <div class="section-sub">Ankles, hips, hamstrings — every day. Quick (10 min) post-run: Ankle circles → 90/90 hips → pigeon → forward fold. Full (20 min) after long run and Sunday.</div>
    <div class="mob-grid">${mobHTML}</div>
    <div class="section-hdr">Sunday Full Mobility Flow · 25–30 min</div>
    <div class="section-sub">The dedicated weekly reset — five zones, full sequence, foam roller helps on quads/IT band but isn't required. Run it every Sunday that isn't a B2B run day (Phase 2 Sundays already get a hard effort — the post-run 10min covers it that day).</div>
    <div class="mob-grid">${sunMobHTML}</div>`;

  const finalHTML = `
    <div class="wk-tab-section">
      <div class="phase-btns">${pBtns}</div>
      ${gymSection}${runSection}${mobSection}
    </div>`;
  _wkCache[scPhase] = finalHTML;
  document.getElementById('pg-workouts').innerHTML=finalHTML;
}
function setScPhase(p){scPhase=p;delete _wkCache[p];renderWorkouts();}

// ─── LEGEND ───────────────────────────────────
function legendHTML(){
  const items=[
    {c:'var(--qual)',l:'Quality run'},{c:'var(--lng)',l:'Long run'},{c:'var(--run)',l:'Easy run'},
    {c:'var(--swm)',l:'Swim'},{c:'var(--gleg)',l:'Gym · Legs'},{c:'var(--gup)',l:'Gym · Upper'},
    {c:'var(--mob)',l:'Mobility'},{c:'var(--b2b)',l:'B2B run'},{c:'var(--rst)',l:'Rest'},
    {c:'var(--tt)',l:'Time trial'},{c:'var(--race)',l:'Race'},
  ];
  return `<div class="legend">${items.map(i=>`<div class="leg"><div class="leg-dot" style="background:${i.c}"></div>${i.l}</div>`).join('')}</div>`;
}

// ─── NAV ──────────────────────────────────────
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bn-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='today') renderToday();
  else if(name==='plan') renderPlan();
  else if(name==='workouts') renderWorkouts();
  else if(name==='missed') renderMissed();
}

function changeWeek(d){
  curWk=Math.min(Math.max(curWk+d,1),30);
  document.getElementById('wkLabel').textContent='Wk '+curWk;
  const active=document.querySelector('.page.active').id.replace('pg-','');
  if(active==='today') renderToday();
  else if(active==='plan') renderPlan();
}

// ─── INIT ─────────────────────────────────────
curWk=getAutoWeek();
document.getElementById('wkLabel').textContent='Wk '+curWk;
renderToday();
renderWorkouts();
renderMissed();
</script>
